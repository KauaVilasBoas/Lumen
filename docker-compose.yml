services:
  mailpit:
    image: axllent/mailpit:latest
    container_name: aegis-mailpit
    ports:
      - "1025:1025"  # SMTP
      - "8025:8025"  # Web UI
    # Messages are NOT persisted — intentional design decision for development:
    # each restart gives a clean inbox, preventing confusion between test runs.
    # To enable persistence, uncomment the volume below and add a top-level
    # volumes entry: mailpit-data: {}
    # volumes:
    #   - ./.mailpit-data:/data
    restart: unless-stopped

  mongo:
    image: mongo:7
    container_name: aegis-mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.runCommand({ ping: 1 })", "--quiet"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: aegis-sqlserver
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: "Dev@AegisIdentity2024!"
    ports:
      - "1433:1433"
    volumes:
      - sqlserver-data:/var/opt/mssql
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "/opt/mssql-tools18/bin/sqlcmd", "-S", "localhost", "-U", "sa", "-P", "Dev@AegisIdentity2024!", "-Q", "SELECT 1", "-No"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

volumes:
  mongo-data:
  sqlserver-data:
