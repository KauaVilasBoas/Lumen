name: Publish NuGet

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      version:
        description: 'Versão do pacote (ex.: 0.4.0)'
        required: true

jobs:
  publish:
    name: Pack & push Lumen.Modularity
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      # Em push de tag a versão vem do nome da tag (v0.4.0 -> 0.4.0);
      # em execução manual vem do input.
      - name: Resolve version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "value=${{ github.event.inputs.version }}" >> "$GITHUB_OUTPUT"
          else
            echo "value=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
          fi

      - name: Pack
        run: >
          dotnet pack src/BuildingBlocks/Lumen.Modularity/Lumen.Modularity.csproj
          --configuration Release
          -p:Version=${{ steps.version.outputs.value }}
          --output ./artifacts

      - name: Push to nuget.org
        run: >
          dotnet nuget push "./artifacts/*.nupkg"
          --api-key ${{ secrets.NUGET_API_KEY }}
          --source https://api.nuget.org/v3/index.json
          --skip-duplicate
