name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build --no-restore --configuration Release

      # Runs unit/module/architecture suites (no Docker required).
      # The ExternalApi category (live HaveIBeenPwned call) and Integration
      # category (Testcontainers · SQL Server + Redis) are excluded here;
      # integration tests run in the dedicated step below.
      - name: Tests (unit + architecture)
        run: >
          dotnet test Lumen.sln
          --no-build --configuration Release
          --filter "Category!=ExternalApi&Category!=Integration"
          --logger "trx;LogFileName=tests.trx"

      # Integration tests require Docker (Testcontainers: SQL Server + Redis).
      # Runs Lumen.IntegrationTests as a separate step so failures here are
      # clearly distinguishable from unit-test failures.
      - name: Tests (integration)
        run: >
          dotnet test tests/Lumen.IntegrationTests
          --no-build --configuration Release
          --filter "Category=Integration"
          --logger "trx;LogFileName=integration-tests.trx"

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: '**/*.trx'
