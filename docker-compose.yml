services:
  mailpit:
    image: axllent/mailpit:latest
    container_name: lumen-mailpit
    ports:
      - "1025:1025"  # SMTP
      - "8025:8025"  # Web UI
    # Messages are NOT persisted — intentional design decision for development:
    # each restart gives a clean inbox, preventing confusion between test runs.
    # To enable persistence, uncomment the volume below and add a top-level
    # volumes entry: mailpit-data: {}
    # volumes:
    #   - ./.mailpit-data:/data
    restart: unless-stopped

  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: lumen-sqlserver
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: "Dev@Lumen2024!"
    ports:
      - "1433:1433"
    volumes:
      - sqlserver-data:/var/opt/mssql
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "/opt/mssql-tools18/bin/sqlcmd", "-S", "localhost", "-U", "sa", "-P", "Dev@Lumen2024!", "-Q", "SELECT 1", "-No"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  redis:
    image: redis:7
    container_name: lumen-redis
    ports:
      - "6379:6379"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

volumes:
  sqlserver-data:
