name: Publish NuGet

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Versão do pacote (ex.: 1.0.0)'
        required: true

jobs:
  publish:
    name: Pack & push Lumen.Modularity
    runs-on: ubuntu-latest

    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Resolve version
        id: version
        run: echo "value=${{ github.event.inputs.version }}" >> "$GITHUB_OUTPUT"

      - name: Pack
        run: >
          dotnet pack src/BuildingBlocks/Lumen.Modularity/Lumen.Modularity.csproj
          --configuration Release
          -p:Version=${{ steps.version.outputs.value }}
          --output ./artifacts

      - name: NuGet login (Trusted Publishing)
        uses: NuGet/login@v1
        id: login
        with:
          user: kauavilasboas

      - name: Push to nuget.org
        run: >
          dotnet nuget push "./artifacts/*.nupkg"
          --api-key ${{ steps.login.outputs.NUGET_API_KEY }}
          --source https://api.nuget.org/v3/index.json
          --skip-duplicate
