name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build --no-restore --configuration Release

      # Runs every test project in Lumen.sln: module suites
      # (Identity, Audit), the Lumen.Modularity building-block suite,
      # the module-boundary architecture suite (NetArchTest) and the
      # legacy unit suite. The ExternalApi category (live HaveIBeenPwned
      # call) is excluded from CI.
      - name: Tests
        run: >
          dotnet test Lumen.sln
          --no-build --configuration Release
          --filter "Category!=ExternalApi"
          --logger "trx;LogFileName=tests.trx"

      # NOTE: tests/Lumen.IntegrationTests (Testcontainers · SQL Server + Redis)
      # is temporarily out of the solution while it is rewritten to target the
      # per-module IdentityDbContext. Re-add a dedicated step here once it builds.

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: '**/*.trx'
